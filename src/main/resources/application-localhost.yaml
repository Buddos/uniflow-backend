# Local Development Environment - Uses Railway Database
server:
  port: 8081
  address: localhost
  servlet:
    context-path: /
    session:
      timeout: 30m
      tracking-modes: cookie
      cookie:
        name: UNIFLOW_SESSION
        http-only: true
        secure: false
        max-age: 1800

  mvc:
    view:
      prefix: /WEB-INF/jsp/
      suffix: .jsp

spring:
  datasource:
    # Railway Database Connection
    url: ${DATABASE_URL:jdbc:postgresql://metro.proxy.rlwy.net:43329/railway}
    username: ${PGUSER:postgres}
    password: ${PGPASSWORD:qRQmGXbLjWAfydROvUkfsTqZsjDgpcgI}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: UniFlowHikariPool
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    open-in-view: false
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

logging:
  level:
    com.uniflow: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.hibernate: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

uniflow:
  session:
    timeout-minutes: 30
  capacity:
    buffer-percentage: 10
    enable-110-percent-rule: true
  timetable:
    generation-days-before-semester: 7
    max-conflict-resolution-attempts: 100
  makeup:
    max-requests-per-week: 3
    advance-booking-days: 14
  equipment:
    return-timeout-hours: 24
    enable-digital-voucher: true
  notifications:
    max-per-user: 100
    retention-days: 30
