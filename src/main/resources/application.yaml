server:
  port: ${PORT:8080}
  servlet:
    context-path: /
    session:
      timeout: 30m
      tracking-modes: cookie
      cookie:
        name: UNIFLOW_SESSION
        http-only: true
        secure: false
        max-age: 1800

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:uniflow_db}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:create-drop}
    show-sql: true
    properties:
      hibernate:
        dialect: ${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    com.uniflow: DEBUG
    org.springframework.web: INFO