server:
  port: ${PORT:8080}
  servlet:
    context-path: /
    session:
      timeout: 30m
      tracking-modes: cookie
      cookie:
        name: UNIFLOW_SESSION
        http-only: true
        secure: false
        max-age: 1800

spring:
  datasource:
    url: jdbc:postgresql://${PGHOST:metro.proxy.rlwy.net}:${PGPORT:43329}/${POSTGRES_DB:railway}
    username: ${PGUSER:postgres}
    password: ${PGPASSWORD:qRQmGXbLjWAfydROvUkfsTqZsjDgpcgI}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

logging:
  level:
    com.uniflow: DEBUG
    org.springframework.web: INFO